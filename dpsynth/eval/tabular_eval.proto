edition = "2023";

package research.privacy.synthetic_tabular_data.evaluation;

option features.field_presence = IMPLICIT;
option java_multiple_files = true;
option java_outer_classname = "TabularEval";

message CategoryCount {
  string category = 1;
  int64 count = 2;
}

message CategoricalAttributeStatistics {
  int64 num_categories = 1;
  repeated CategoryCount category_counts = 2;
}

message AttributeStatistics {
  string attribute_name = 1;
  int64 num_non_none_values = 2;
  CategoricalAttributeStatistics categorical_statistics = 3;
}

message CorrelationValue {
  string attribute_x = 1;
  string attribute_y = 2;
  double value = 3;
}

message DatasetStatistics {
  int64 num_records = 1;
  repeated AttributeStatistics attribute_statistics = 2;
  repeated CorrelationValue correlations = 3;
}

enum DataType {
  DATA_TYPE_UNSPECIFIED = 0;
  INT_CATEGORICAL = 1;
  STRING = 2;
  BOOLEAN = 3;
}

message TabularEvalConfig {
  repeated string attributes = 1;
  repeated DataType attribute_types = 2;
  int32 max_marginal_degree = 3 [features.field_presence = EXPLICIT];
}

message AttributeEvalReport {
  string attribute_name = 1;
  DataType attribute_type = 2;
  string error_message = 3;
  double tv_distance = 4 [features.field_presence = EXPLICIT];

  double chi2_pvalue = 5 [features.field_presence = EXPLICIT];
}

message UnseenCombination {
  repeated string values = 1;
  int64 count = 2;
}

message CategoricalMarginal {
  repeated int32 attribute_indices = 1;
  double tv_distance = 2;
  int64 num_unseen_combinations = 3;
  int64 unseen_occurrences = 4;
  repeated UnseenCombination top_unseen_combinations = 5;
}

message TabularEvalReport {
  DatasetStatistics original_dataset_statistics = 1;
  DatasetStatistics synthetic_dataset_statistics = 2;
  repeated AttributeEvalReport attribute_eval_reports = 3;
  double correlation_distance = 4 [features.field_presence = EXPLICIT];
  repeated CategoricalMarginal marginal_eval_reports = 5;
}

message Record {
  repeated string values = 1;
}
